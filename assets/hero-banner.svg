<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="100%" height="280">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0d0221"/>
      <stop offset="50%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>

    <!-- Sun gradient -->
    <linearGradient id="sunG" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="40%" stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#8800ff"/>
    </linearGradient>

    <!-- Neon line gradient left-to-right -->
    <linearGradient id="lineG" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ff2975" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ff2975"/>
      <stop offset="70%" stop-color="#00f3ff"/>
      <stop offset="100%" stop-color="#00f3ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Title glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft outer glow filter -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Badge gradient -->
    <linearGradient id="badgePink" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ff2975" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a0b2e" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="badgeCyan" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a0b2e" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="badgeGold" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f9c80e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a0b2e" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="badgePurple" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8800ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a0b2e" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="1000" height="280" fill="url(#bgGrad)" rx="14"/>

  <!-- Grid horizontal lines -->
  <g stroke="#ff2975" stroke-opacity="0.12" stroke-width="1">
    <line x1="0" y1="60"  x2="1000" y2="60"/>
    <line x1="0" y1="90"  x2="1000" y2="90"/>
    <line x1="0" y1="120" x2="1000" y2="120"/>
    <line x1="0" y1="150" x2="1000" y2="150"/>
    <line x1="0" y1="180" x2="1000" y2="180"/>
    <line x1="0" y1="210" x2="1000" y2="210"/>
    <line x1="0" y1="240" x2="1000" y2="240"/>
  </g>
  <!-- Grid vertical lines -->
  <g stroke="#00f3ff" stroke-opacity="0.08" stroke-width="1">
    <line x1="100"  y1="0" x2="100"  y2="280"/>
    <line x1="200"  y1="0" x2="200"  y2="280"/>
    <line x1="300"  y1="0" x2="300"  y2="280"/>
    <line x1="400"  y1="0" x2="400"  y2="280"/>
    <line x1="500"  y1="0" x2="500"  y2="280"/>
    <line x1="600"  y1="0" x2="600"  y2="280"/>
    <line x1="700"  y1="0" x2="700"  y2="280"/>
    <line x1="800"  y1="0" x2="800"  y2="280"/>
    <line x1="900"  y1="0" x2="900"  y2="280"/>
  </g>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="60"  cy="25"  r="1.2" opacity="0.6"/>
    <circle cx="180" cy="18"  r="0.9" opacity="0.7"/>
    <circle cx="340" cy="35"  r="1.5" opacity="0.5"/>
    <circle cx="480" cy="22"  r="1.0" opacity="0.8"/>
    <circle cx="640" cy="40"  r="0.8" opacity="0.6"/>
    <circle cx="780" cy="15"  r="1.3" opacity="0.7"/>
    <circle cx="920" cy="30"  r="1.1" opacity="0.5"/>
    <circle cx="80"  cy="200" r="0.8" opacity="0.4"/>
    <circle cx="950" cy="180" r="1.0" opacity="0.4"/>
    <!-- Twinkling stars -->
    <circle cx="260" cy="50" r="1.5" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="28" r="1.2" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="55" r="1.0" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- RETRO SUN (right side, half visible) -->
  <g transform="translate(860, 140)">
    <!-- Glow aura -->
    <circle cx="0" cy="0" r="70" fill="#ff4400" fill-opacity="0.08" filter="url(#softglow)"/>
    <!-- Sun semicircle - top half -->
    <path d="M -60 0 A 60 60 0 0 1 60 0 Z" fill="url(#sunG)"/>
    <!-- Horizontal scan lines on sun -->
    <rect x="-59" y="8"  width="118" height="5"  rx="1" fill="#0d0221" fill-opacity="0.55"/>
    <rect x="-55" y="18" width="110" height="6"  rx="1" fill="#0d0221" fill-opacity="0.55"/>
    <rect x="-49" y="29" width="98"  height="7"  rx="1" fill="#0d0221" fill-opacity="0.55"/>
    <rect x="-41" y="41" width="82"  height="8"  rx="1" fill="#0d0221" fill-opacity="0.55"/>
    <rect x="-28" y="54" width="56"  height="6"  rx="1" fill="#0d0221" fill-opacity="0.55"/>
  </g>

  <!-- Horizon neon line -->
  <rect x="0" y="139" width="1000" height="2" fill="url(#lineG)" opacity="0.8"/>
  <!-- Extra glow line -->
  <rect x="0" y="138" width="1000" height="4" fill="url(#lineG)" opacity="0.25"/>

  <!-- Moving scan line (SMIL) -->
  <rect x="0" y="138" width="80" height="4" rx="2" fill="#00f3ff" opacity="0.7" filter="url(#glow)">
    <animate attributeName="x" from="-80" to="1080" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.05;0.95;1" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- === LEFT SIDE: NAME BLOCK === -->
  <!-- Decorative corner bracket top-left -->
  <g stroke="#00f3ff" stroke-width="2.5" fill="none" opacity="0.7">
    <polyline points="30,20 30,42 52,42"/>
  </g>
  <!-- Decorative corner bracket bottom-left -->
  <g stroke="#ff2975" stroke-width="2.5" fill="none" opacity="0.7">
    <polyline points="30,258 30,236 52,236"/>
  </g>

  <!-- ROHIT - Main Title Glow Layer -->
  <text x="64" y="96" font-family="'Segoe UI', Arial, sans-serif" font-weight="900"
        font-size="64" fill="#ff2975" opacity="0.3" filter="url(#softglow)">ROHIT</text>
  <!-- ROHIT - Main Title -->
  <text x="64" y="96" font-family="'Segoe UI', Arial, sans-serif" font-weight="900"
        font-size="64" fill="#ffffff" letter-spacing="4" filter="url(#glow)">ROHIT</text>

  <!-- BHUSARE - Second line Glow Layer -->
  <text x="64" y="160" font-family="'Segoe UI', Arial, sans-serif" font-weight="900"
        font-size="64" fill="#00f3ff" opacity="0.3" filter="url(#softglow)">BHUSARE</text>
  <!-- BHUSARE - Second line -->
  <text x="64" y="160" font-family="'Segoe UI', Arial, sans-serif" font-weight="900"
        font-size="64" fill="#00f3ff" letter-spacing="2" filter="url(#glow)">BHUSARE</text>

  <!-- Role subtitle -->
  <text x="66" y="196" font-family="'Segoe UI', Arial, sans-serif" font-weight="700"
        font-size="16" fill="#f9c80e" letter-spacing="5">DEVOPS  &amp;  CLOUD  ARCHITECT</text>

  <!-- Location + flag -->
  <text x="66" y="224" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#94a3b8" letter-spacing="2">PUNE, INDIA  |  OPEN TO WORK</text>

  <!-- Live pulse dot -->
  <circle cx="66" cy="219" r="5" fill="#10b981">
    <animate attributeName="r" values="5;8;5" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="78" y="224" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#94a3b8" letter-spacing="2">PUNE, INDIA  |  OPEN TO WORK</text>

  <!-- === BADGE ROW === -->
  <!-- AWS -->
  <g transform="translate(64, 240)">
    <rect x="0" y="0" width="72" height="28" rx="6" fill="url(#badgeGold)" stroke="#f9c80e" stroke-width="1" stroke-opacity="0.6"/>
    <text x="36" y="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="11" font-weight="700" fill="#f9c80e" letter-spacing="1">AWS</text>
  </g>
  <!-- TERRAFORM -->
  <g transform="translate(148, 240)">
    <rect x="0" y="0" width="92" height="28" rx="6" fill="url(#badgePurple)" stroke="#8800ff" stroke-width="1" stroke-opacity="0.6"/>
    <text x="46" y="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="11" font-weight="700" fill="#b97aff" letter-spacing="1">TERRAFORM</text>
  </g>
  <!-- DOCKER -->
  <g transform="translate(252, 240)">
    <rect x="0" y="0" width="78" height="28" rx="6" fill="url(#badgeCyan)" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.6"/>
    <text x="39" y="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="11" font-weight="700" fill="#00f3ff" letter-spacing="1">DOCKER</text>
  </g>
  <!-- K8S -->
  <g transform="translate(342, 240)">
    <rect x="0" y="0" width="94" height="28" rx="6" fill="url(#badgeCyan)" stroke="#326ce5" stroke-width="1" stroke-opacity="0.6"/>
    <text x="47" y="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="11" font-weight="700" fill="#7ea8ff" letter-spacing="1">KUBERNETES</text>
  </g>
  <!-- JENKINS -->
  <g transform="translate(448, 240)">
    <rect x="0" y="0" width="80" height="28" rx="6" fill="url(#badgePink)" stroke="#ff2975" stroke-width="1" stroke-opacity="0.6"/>
    <text x="40" y="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="11" font-weight="700" fill="#ff6a9e" letter-spacing="1">JENKINS</text>
  </g>
  <!-- ANSIBLE -->
  <g transform="translate(540, 240)">
    <rect x="0" y="0" width="78" height="28" rx="6" fill="url(#badgePink)" stroke="#ee0000" stroke-width="1" stroke-opacity="0.6"/>
    <text x="39" y="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="11" font-weight="700" fill="#ff7070" letter-spacing="1">ANSIBLE</text>
  </g>
  <!-- LINUX -->
  <g transform="translate(630, 240)">
    <rect x="0" y="0" width="65" height="28" rx="6" fill="url(#badgeGold)" stroke="#f9c80e" stroke-width="1" stroke-opacity="0.5"/>
    <text x="32" y="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="11" font-weight="700" fill="#f9c80e" letter-spacing="1">LINUX</text>
  </g>
  <!-- PYTHON -->
  <g transform="translate(707, 240)">
    <rect x="0" y="0" width="72" height="28" rx="6" fill="url(#badgeCyan)" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.5"/>
    <text x="36" y="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="11" font-weight="700" fill="#7dd3fc" letter-spacing="1">PYTHON</text>
  </g>

  <!-- === RIGHT SIDE: STATS PANEL === -->
  <!-- Panel border -->
  <rect x="780" y="20" width="190" height="110" rx="10"
        fill="#0d0221" fill-opacity="0.7" stroke="#f222ff" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Stats header -->
  <text x="875" y="44" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="10" font-weight="700" fill="#f222ff" letter-spacing="3">LIVE  STATS</text>
  <line x1="790" y1="50" x2="960" y2="50" stroke="#f222ff" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Stat 1: Projects -->
  <text x="800" y="70" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#94a3b8" letter-spacing="1">PROJECTS</text>
  <text x="956" y="70" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#f9c80e">25+</text>

  <!-- Stat 2: Cloud Infra -->
  <text x="800" y="90" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#94a3b8" letter-spacing="1">CLOUD IaC</text>
  <text x="956" y="90" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#00f3ff">ACTIVE</text>

  <!-- Stat 3: Uptime -->
  <text x="800" y="110" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#94a3b8" letter-spacing="1">UPTIME</text>
  <text x="956" y="110" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#10b981">99.99%</text>

  <!-- Separator line -->
  <line x1="790" y1="118" x2="960" y2="118" stroke="#f222ff" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- STATUS: Open to work -->
  <circle cx="800" cy="128" r="4" fill="#10b981">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="812" y="132" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="700" fill="#10b981" letter-spacing="2">OPEN  TO  WORK</text>

  <!-- Tagline -->
  <text x="500" y="20" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="10" fill="#ffffff" fill-opacity="0.2" letter-spacing="4">
    while(alive) automate();
  </text>

  <!-- Bottom neon line -->
  <rect x="0" y="276" width="1000" height="2" fill="url(#lineG)" opacity="0.5"/>

  <!-- Corner brackets top-right -->
  <g stroke="#00f3ff" stroke-width="2.5" fill="none" opacity="0.7">
    <polyline points="970,20 970,42 948,42"/>
  </g>
  <!-- Corner brackets bottom-right -->
  <g stroke="#ff2975" stroke-width="2.5" fill="none" opacity="0.7">
    <polyline points="970,258 970,236 948,236"/>
  </g>
</svg>
