<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="100%" height="100%">
  <defs>
    <!-- CSS Styles -->
    <style>
      .bg { fill: #080314; }
      
      /* Synthwave Grid Animation */
      .grid-line {
        stroke: #f222ff;
        stroke-width: 1.2;
        stroke-opacity: 0.4;
      }
      
      .grid-horiz {
        stroke: #ff2975;
        stroke-width: 1.5;
        stroke-opacity: 0.5;
        animation: moveGrid 3s linear infinite;
      }

      @keyframes moveGrid {
        0% { transform: translateY(0); }
        100% { transform: translateY(24px); }
      }

      /* Glow Effects */
      .glow-pink {
        filter: drop-shadow(0px 0px 8px #ff2975) drop-shadow(0px 0px 20px #ff2975);
      }
      .glow-cyan {
        filter: drop-shadow(0px 0px 8px #00f3ff) drop-shadow(0px 0px 18px #00f3ff);
      }
      .glow-gold {
        filter: drop-shadow(0px 0px 6px #f9c80e) drop-shadow(0px 0px 14px #f9c80e);
      }
      .glow-box {
        filter: drop-shadow(0px 0px 12px rgba(242, 34, 255, 0.4));
      }

      /* Text Styles */
      .title-name {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        font-weight: 900;
        font-size: 48px;
        letter-spacing: 6px;
        fill: #ffffff;
      }

      .subtitle {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 4px;
        fill: #00f3ff;
      }

      .tagline {
        font-family: 'Consolas', 'Courier New', monospace;
        font-weight: 700;
        font-size: 13px;
        fill: #ffe600;
        letter-spacing: 2px;
      }

      .badge-text {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        font-weight: 700;
        font-size: 11px;
        fill: #ffffff;
        letter-spacing: 1.5px;
      }

      /* Pulsing & Scanning Animations */
      .pulse-slow {
        animation: pulse 4s ease-in-out infinite alternate;
      }
      
      @keyframes pulse {
        0% { opacity: 0.8; }
        100% { opacity: 1; filter: drop-shadow(0px 0px 15px #ff2975); }
      }

      .scanner-line {
        animation: scan 4s ease-in-out infinite alternate;
      }

      @keyframes scan {
        0% { transform: translateX(0); opacity: 0.2; }
        50% { opacity: 0.9; }
        100% { transform: translateX(960px); opacity: 0.2; }
      }

      .float-icon {
        animation: float 3s ease-in-out infinite alternate;
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-5px); }
      }
    </style>

    <!-- Sun Gradients -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9c80e" />
      <stop offset="50%" stop-color="#ff2975" />
      <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>

    <!-- Horizon Gradient -->
    <linearGradient id="horizonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.8" />
      <stop offset="20%" stop-color="#ff2975" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#080314" stop-opacity="0" />
    </linearGradient>

    <!-- Card Background Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0b2e" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0a051b" stop-opacity="0.9" />
    </linearGradient>

    <!-- Badge Border Gradients -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2975" />
      <stop offset="50%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#f222ff" />
    </linearGradient>

    <!-- Sun Mask for Retro Stripes -->
    <mask id="sunMask">
      <rect x="0" y="0" width="1000" height="360" fill="white" />
      <rect x="350" y="150" width="300" height="3" fill="black" />
      <rect x="350" y="160" width="300" height="4" fill="black" />
      <rect x="350" y="172" width="300" height="6" fill="black" />
      <rect x="350" y="186" width="300" height="8" fill="black" />
      <rect x="350" y="202" width="300" height="10" fill="black" />
    </mask>

    <!-- Floor Clip Path -->
    <clipPath id="floorClip">
      <rect x="0" y="220" width="1000" height="140" />
    </clipPath>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="40" height="24" patternUnits="userSpaceOnUse">
      <line x1="0" y1="24" x2="40" y2="24" class="grid-horiz" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="360" class="bg" rx="16" />

  <!-- Stars / Particle Dust -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="80" cy="40" r="1" />
    <circle cx="150" cy="90" r="1.5" opacity="0.8" />
    <circle cx="240" cy="30" r="1" />
    <circle cx="380" cy="70" r="1.2" />
    <circle cx="720" cy="45" r="1" />
    <circle cx="850" cy="80" r="1.8" opacity="0.9" />
    <circle cx="920" cy="35" r="1" />
    <circle cx="95" cy="140" r="1" />
    <circle cx="910" cy="150" r="1.2" />
  </g>

  <!-- Retrowave Sun -->
  <circle cx="500" cy="145" r="85" fill="url(#sunGrad)" mask="url(#sunMask)" class="glow-pink" />

  <!-- Mountain Silhouette Line -->
  <path d="M 0 220 L 120 170 L 220 200 L 340 150 L 440 190 L 500 165 L 560 190 L 680 140 L 780 195 L 880 160 L 1000 220 V 360 H 0 Z" fill="#0c0624" />
  <path d="M 0 220 L 120 170 L 220 200 L 340 150 L 440 190 L 500 165 L 560 190 L 680 140 L 780 195 L 880 160 L 1000 220" fill="none" stroke="#ff2975" stroke-width="2" class="glow-pink" opacity="0.7" />

  <!-- Horizon Glow -->
  <rect x="0" y="210" width="1000" height="150" fill="url(#horizonGrad)" />
  <line x1="0" y1="220" x2="1000" y2="220" stroke="#00f3ff" stroke-width="2" class="glow-cyan" />

  <!-- Perspective Grid Floor -->
  <g clip-path="url(#floorClip)">
    <!-- Moving Horizontal Lines -->
    <rect x="0" y="210" width="1000" height="160" fill="url(#gridPattern)" />

    <!-- Perspective Lines -->
    <g class="grid-line">
      <line x1="500" y1="220" x2="-200" y2="360" />
      <line x1="500" y1="220" x2="-50" y2="360" />
      <line x1="500" y1="220" x2="100" y2="360" />
      <line x1="500" y1="220" x2="250" y2="360" />
      <line x1="500" y1="220" x2="380" y2="360" />
      <line x1="500" y1="220" x2="500" y2="360" />
      <line x1="500" y1="220" x2="620" y2="360" />
      <line x1="500" y1="220" x2="750" y2="360" />
      <line x1="500" y1="220" x2="900" y2="360" />
      <line x1="500" y1="220" x2="1050" y2="360" />
      <line x1="500" y1="220" x2="1200" y2="360" />
    </g>
  </g>

  <!-- Central Retrowave Frame Overlay -->
  <g transform="translate(100, 35)">
    <!-- Container Card -->
    <rect x="0" y="0" width="800" height="235" rx="16" fill="url(#cardGrad)" stroke="url(#borderGrad)" stroke-width="2" class="glow-box" />

    <!-- Corner Accents -->
    <path d="M 0 20 L 0 0 L 20 0" fill="none" stroke="#00f3ff" stroke-width="4" />
    <path d="M 780 0 L 800 0 L 800 20" fill="none" stroke="#00f3ff" stroke-width="4" />
    <path d="M 800 215 L 800 235 L 780 235" fill="none" stroke="#ff2975" stroke-width="4" />
    <path d="M 20 235 L 0 235 L 0 215" fill="none" stroke="#ff2975" stroke-width="4" />

    <!-- Name & Titles -->
    <g transform="translate(400, 65)" text-anchor="middle">
      <!-- Glow Underlay -->
      <text x="0" y="0" class="title-name glow-pink" opacity="0.9">ROHIT BHUSARE</text>
      <!-- Main Text -->
      <text x="0" y="0" class="title-name">ROHIT BHUSARE</text>
      
      <!-- Subtitle -->
      <text x="0" y="32" class="subtitle glow-cyan">DEVOPS &amp; CLOUD ARCHITECT</text>
      
      <!-- Terminal Tagline -->
      <g transform="translate(0, 62)">
        <rect x="-240" y="-16" width="480" height="26" rx="6" fill="#080314" stroke="#f9c80e" stroke-width="1.2" class="glow-gold" />
        <text x="0" y="1" text-anchor="middle" class="tagline">&#x26A1; AUTOMATING CLOUD INFRASTRUCTURE WITH ZERO DOWNTIME &#x26A1;</text>
      </g>
    </g>

    <!-- Floating Tech Badges Inside Frame -->
    <g transform="translate(50, 168)">
      <!-- AWS -->
      <g transform="translate(0, 0)" class="float-icon">
        <rect x="0" y="0" width="100" height="34" rx="8" fill="#150a21" stroke="#ff9900" stroke-width="1.5" />
        <text x="50" y="21" text-anchor="middle" class="badge-text" fill="#ff9900">☁️ AWS</text>
      </g>

      <!-- TERRAFORM -->
      <g transform="translate(115, 0)" class="float-icon" style="animation-delay: 0.3s;">
        <rect x="0" y="0" width="125" height="34" rx="8" fill="#150a21" stroke="#7b42bc" stroke-width="1.5" />
        <text x="62" y="21" text-anchor="middle" class="badge-text" fill="#8a2be2">🏗️ TERRAFORM</text>
      </g>

      <!-- DOCKER -->
      <g transform="translate(255, 0)" class="float-icon" style="animation-delay: 0.6s;">
        <rect x="0" y="0" width="110" height="34" rx="8" fill="#150a21" stroke="#2496ed" stroke-width="1.5" />
        <text x="55" y="21" text-anchor="middle" class="badge-text" fill="#00f3ff">🐳 DOCKER</text>
      </g>

      <!-- KUBERNETES -->
      <g transform="translate(380, 0)" class="float-icon" style="animation-delay: 0.9s;">
        <rect x="0" y="0" width="135" height="34" rx="8" fill="#150a21" stroke="#326ce5" stroke-width="1.5" />
        <text x="67" y="21" text-anchor="middle" class="badge-text" fill="#326ce5">☸️ KUBERNETES</text>
      </g>

      <!-- JENKINS -->
      <g transform="translate(530, 0)" class="float-icon" style="animation-delay: 1.2s;">
        <rect x="0" y="0" width="105" height="34" rx="8" fill="#150a21" stroke="#ff2975" stroke-width="1.5" />
        <text x="52" y="21" text-anchor="middle" class="badge-text" fill="#ff2975">🔁 JENKINS</text>
      </g>

      <!-- ANSIBLE -->
      <g transform="translate(650, 0)" class="float-icon" style="animation-delay: 1.5s;">
        <rect x="0" y="0" width="100" height="34" rx="8" fill="#150a21" stroke="#ee0000" stroke-width="1.5" />
        <text x="50" y="21" text-anchor="middle" class="badge-text" fill="#ee0000">📦 ANSIBLE</text>
      </g>
    </g>
  </g>

  <!-- Top Laser Scanner Line -->
  <line x1="20" y1="12" x2="100" y2="12" stroke="#00f3ff" stroke-width="3" stroke-linecap="round" class="scanner-line glow-cyan" />
  <line x1="20" y1="348" x2="100" y2="348" stroke="#ff2975" stroke-width="3" stroke-linecap="round" class="scanner-line glow-pink" style="animation-direction: reverse;" />
</svg>
