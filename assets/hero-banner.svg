<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#03001e"/>
      <stop offset="40%"  stop-color="#0d0633"/>
      <stop offset="100%" stop-color="#060417"/>
    </linearGradient>

    <!-- Neon heading gradient -->
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ff2975"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00f3ff"/>
    </linearGradient>

    <!-- Horizontal scan-line gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ff2975" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#ff2975"/>
      <stop offset="80%"  stop-color="#00f3ff"/>
      <stop offset="100%" stop-color="#00f3ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Sun gradient -->
    <linearGradient id="sunG" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffe600"/>
      <stop offset="45%"  stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#7700cc"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1a0b2e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a0422" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Glow filter for name -->
    <filter id="glowName" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle glow filter -->
    <filter id="glowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="900" height="320" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid overlay -->
  <g stroke="#ff2975" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="53" x2="900" y2="53"/>
    <line x1="0" y1="106" x2="900" y2="106"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="213" x2="900" y2="213"/>
    <line x1="0" y1="266" x2="900" y2="266"/>
  </g>
  <g stroke="#00f3ff" stroke-opacity="0.05" stroke-width="1">
    <line x1="112" y1="0" x2="112" y2="320"/>
    <line x1="225" y1="0" x2="225" y2="320"/>
    <line x1="337" y1="0" x2="337" y2="320"/>
    <line x1="450" y1="0" x2="450" y2="320"/>
    <line x1="562" y1="0" x2="562" y2="320"/>
    <line x1="675" y1="0" x2="675" y2="320"/>
    <line x1="787" y1="0" x2="787" y2="320"/>
  </g>

  <!-- ── STARS ── -->
  <g fill="#ffffff">
    <circle cx="44"  cy="19"  r="1.0" opacity="0.5"/>
    <circle cx="130" cy="40"  r="0.8" opacity="0.7"/>
    <circle cx="278" cy="28"  r="1.3" opacity="0.5"/>
    <circle cx="420" cy="15"  r="0.9" opacity="0.8"/>
    <circle cx="590" cy="44"  r="1.1" opacity="0.6"/>
    <circle cx="730" cy="22"  r="0.8" opacity="0.7"/>
    <circle cx="855" cy="38"  r="1.2" opacity="0.5"/>
    <circle cx="20"  cy="280" r="0.8" opacity="0.3"/>
    <circle cx="875" cy="260" r="0.9" opacity="0.3"/>
    <!-- Twinkling -->
    <circle cx="200" cy="32" r="1.4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="18" r="1.1" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="50" r="0.9" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ── RETRO SUN (right) ── -->
  <g transform="translate(780, 155)">
    <!-- Outer aura -->
    <circle cx="0" cy="0" r="90" fill="#ff3300" fill-opacity="0.05" filter="url(#glowSoft)"/>
    <!-- Main semicircle -->
    <path d="M -70 0 A 70 70 0 0 1 70 0 Z" fill="url(#sunG)"/>
    <!-- Retrowave stripes (cut from sun body) -->
    <rect x="-69" y="7"  width="138" height="6"  rx="1" fill="#03001e" fill-opacity="0.6"/>
    <rect x="-65" y="18" width="130" height="7"  rx="1" fill="#03001e" fill-opacity="0.6"/>
    <rect x="-59" y="30" width="118" height="8"  rx="1" fill="#03001e" fill-opacity="0.6"/>
    <rect x="-51" y="43" width="102" height="9"  rx="1" fill="#03001e" fill-opacity="0.6"/>
    <rect x="-38" y="57" width="76"  height="9"  rx="1" fill="#03001e" fill-opacity="0.6"/>
  </g>

  <!-- ── HORIZON LINE ── -->
  <rect x="0" y="154" width="900" height="2" fill="url(#scanGrad)" opacity="0.9"/>
  <!-- Glow on horizon -->
  <rect x="0" y="152" width="900" height="6" fill="url(#scanGrad)" opacity="0.18"/>

  <!-- ── ANIMATED SCAN BEAM ── -->
  <rect x="-120" y="152" width="120" height="4" rx="2" fill="#00f3ff" opacity="0.85" filter="url(#glowSoft)">
    <animate attributeName="x" from="-120" to="900" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.05;0.92;1" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- ── MAIN CARD PANEL ── -->
  <rect x="22" y="22" width="660" height="276" rx="12"
        fill="url(#cardBg)" stroke="#f222ff" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Card corner accents -->
  <g stroke="#00f3ff" stroke-width="2.5" fill="none" opacity="0.8">
    <polyline points="22,42 22,22 42,22"/>
    <polyline points="662,22 682,22 682,42"/>
  </g>
  <g stroke="#ff2975" stroke-width="2.5" fill="none" opacity="0.8">
    <polyline points="22,278 22,298 42,298"/>
    <polyline points="662,298 682,298 682,278"/>
  </g>

  <!-- ── NAME — ROHIT BHUSARE ── -->
  <!-- Shadow/glow layer -->
  <text x="46" y="98" font-family="'Segoe UI', Arial, sans-serif"
        font-weight="900" font-size="58" fill="#ff2975" fill-opacity="0.25"
        letter-spacing="3">ROHIT BHUSARE</text>
  <!-- Main name -->
  <text x="46" y="98" font-family="'Segoe UI', Arial, sans-serif"
        font-weight="900" font-size="58" fill="url(#nameGrad)"
        letter-spacing="3" filter="url(#glowName)">ROHIT BHUSARE</text>

  <!-- Underline accent -->
  <rect x="46" y="108" width="440" height="2" rx="1" fill="url(#scanGrad)" opacity="0.7"/>

  <!-- ── ROLE / SUBTITLE ── -->
  <text x="48" y="138" font-family="'Segoe UI', Arial, sans-serif"
        font-weight="700" font-size="15" fill="#f9c80e" letter-spacing="5" opacity="0.95">
    DEVOPS  |  CLOUD  |  AUTOMATION
  </text>

  <!-- ── ABOUT LINE ── -->
  <text x="48" y="166" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#94a3b8" letter-spacing="1">
    Building scalable cloud infra with zero downtime on AWS
  </text>

  <!-- ── STATS ROW ── -->
  <!-- Projects -->
  <g transform="translate(48, 188)">
    <rect x="0" y="0" width="82" height="42" rx="8"
          fill="#ff2975" fill-opacity="0.12" stroke="#ff2975" stroke-width="1" stroke-opacity="0.5"/>
    <text x="41" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="18" font-weight="900" fill="#ff2975">25+</text>
    <text x="41" y="33" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#94a3b8" letter-spacing="1">PROJECTS</text>
  </g>
  <!-- AWS -->
  <g transform="translate(144, 188)">
    <rect x="0" y="0" width="82" height="42" rx="8"
          fill="#f9c80e" fill-opacity="0.10" stroke="#f9c80e" stroke-width="1" stroke-opacity="0.5"/>
    <text x="41" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="18" font-weight="900" fill="#f9c80e">AWS</text>
    <text x="41" y="33" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#94a3b8" letter-spacing="1">CLOUD</text>
  </g>
  <!-- IaC -->
  <g transform="translate(240, 188)">
    <rect x="0" y="0" width="82" height="42" rx="8"
          fill="#00f3ff" fill-opacity="0.10" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.5"/>
    <text x="41" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="18" font-weight="900" fill="#00f3ff">IaC</text>
    <text x="41" y="33" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#94a3b8" letter-spacing="1">TERRAFORM</text>
  </g>
  <!-- Uptime -->
  <g transform="translate(336, 188)">
    <rect x="0" y="0" width="96" height="42" rx="8"
          fill="#10b981" fill-opacity="0.10" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
    <text x="48" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="18" font-weight="900" fill="#10b981">99.9%</text>
    <text x="48" y="33" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#94a3b8" letter-spacing="1">UPTIME</text>
  </g>
  <!-- CI/CD -->
  <g transform="translate(446, 188)">
    <rect x="0" y="0" width="82" height="42" rx="8"
          fill="#f222ff" fill-opacity="0.10" stroke="#f222ff" stroke-width="1" stroke-opacity="0.5"/>
    <text x="41" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="15" font-weight="900" fill="#f222ff">CI/CD</text>
    <text x="41" y="33" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#94a3b8" letter-spacing="1">AUTOMATED</text>
  </g>

  <!-- ── TECH BADGE ROW ── -->
  <g transform="translate(48, 248)">
    <!-- Terraform -->
    <rect x="0"   y="0" width="80" height="26" rx="5" fill="#7b42bc" fill-opacity="0.2" stroke="#7b42bc" stroke-width="0.8" stroke-opacity="0.7"/>
    <text x="40"  y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#b97aff" letter-spacing="1">TERRAFORM</text>
    <!-- Docker -->
    <rect x="90"  y="0" width="64" height="26" rx="5" fill="#2496ed" fill-opacity="0.2" stroke="#2496ed" stroke-width="0.8" stroke-opacity="0.7"/>
    <text x="122" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#60c4ff" letter-spacing="1">DOCKER</text>
    <!-- K8s -->
    <rect x="164" y="0" width="92" height="26" rx="5" fill="#326ce5" fill-opacity="0.2" stroke="#326ce5" stroke-width="0.8" stroke-opacity="0.7"/>
    <text x="210" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#7ea8ff" letter-spacing="1">KUBERNETES</text>
    <!-- Jenkins -->
    <rect x="266" y="0" width="70" height="26" rx="5" fill="#ff2975" fill-opacity="0.2" stroke="#ff2975" stroke-width="0.8" stroke-opacity="0.7"/>
    <text x="301" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#ff6a9e" letter-spacing="1">JENKINS</text>
    <!-- Ansible -->
    <rect x="346" y="0" width="72" height="26" rx="5" fill="#ee0000" fill-opacity="0.2" stroke="#ee0000" stroke-width="0.8" stroke-opacity="0.7"/>
    <text x="382" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#ff7070" letter-spacing="1">ANSIBLE</text>
    <!-- Linux -->
    <rect x="428" y="0" width="60" height="26" rx="5" fill="#f9c80e" fill-opacity="0.15" stroke="#f9c80e" stroke-width="0.8" stroke-opacity="0.6"/>
    <text x="458" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#f9c80e" letter-spacing="1">LINUX</text>
    <!-- Python -->
    <rect x="498" y="0" width="64" height="26" rx="5" fill="#00f3ff" fill-opacity="0.15" stroke="#00f3ff" stroke-width="0.8" stroke-opacity="0.6"/>
    <text x="530" y="17" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#7dd3fc" letter-spacing="1">PYTHON</text>
  </g>

  <!-- ── OPEN TO WORK INDICATOR ── -->
  <g transform="translate(48, 289)">
    <circle cx="6" cy="6" r="5" fill="#10b981">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5;7;5" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="20" y="11" font-family="'Segoe UI', Arial, sans-serif"
          font-size="11" font-weight="700" fill="#10b981" letter-spacing="2">OPEN TO WORK  |  PUNE, INDIA</text>
  </g>

  <!-- ── DECORATIVE BOTTOM LINE ── -->
  <rect x="22" y="316" width="660" height="1.5" rx="1" fill="url(#scanGrad)" opacity="0.4"/>

  <!-- ── OUTER CORNER BRACKETS ── -->
  <g stroke="#f222ff" stroke-width="1.5" fill="none" opacity="0.4">
    <polyline points="4,12 4,4 12,4"/>
    <polyline points="888,4 896,4 896,12"/>
    <polyline points="4,308 4,316 12,316"/>
    <polyline points="888,316 896,316 896,308"/>
  </g>
</svg>
